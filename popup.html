<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Muter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 20px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .icon {
      width: 32px;
      height: 32px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .subtitle {
      font-size: 11px;
      color: #64748b;
    }

    /* Status badge */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4ade80;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .dot.muted { background: #f87171; animation: pulse 1.4s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 13px;
      color: #94a3b8;
    }

    .countdown {
      margin-left: auto;
      font-size: 13px;
      font-weight: 700;
      color: #f87171;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }

    /* Duration input */
    .label {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .preset-btn {
      flex: 1;
      padding: 7px 0;
      border: 1px solid #2d3748;
      background: #1e2330;
      color: #94a3b8;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .preset-btn:hover { border-color: #6366f1; color: #a5b4fc; background: #1a1d2e; }
    .preset-btn.active { border-color: #6366f1; color: #a5b4fc; background: #1e1b4b; }

    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="number"] {
      flex: 1;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus { border-color: #6366f1; }

    .unit {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }

    /* Buttons */
    .btn-mute {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 8px;
    }

    .btn-mute:hover { opacity: 0.9; }
    .btn-mute:active { transform: scale(0.98); }
    .btn-mute:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-unmute {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: #f87171;
      border: 1px solid #f87171;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }

    .btn-unmute:hover { background: rgba(248,113,113,0.1); }
    .btn-unmute.visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">🔇</div>
    <div>
      <div class="title">Tab Muter</div>
      <div class="subtitle">Silence this tab temporarily</div>
    </div>
  </div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">Tab is active</span>
    <span class="countdown" id="countdown"></span>
  </div>

  <div class="label">Duration</div>

  <div class="input-row">
    <button class="preset-btn" data-s="60">1m</button>
    <button class="preset-btn active" data-s="150">2m 30s</button>
    <button class="preset-btn" data-s="300">5m</button>
    <button class="preset-btn" data-s="600">10m</button>
  </div>

  <div class="custom-row">
    <input type="number" id="duration" value="150" min="1" max="86400" />
    <span class="unit">seconds</span>
  </div>

  <button class="btn-mute" id="btnMute">Mute for 2m 30s</button>
  <button class="btn-unmute" id="btnUnmute">Unmute Now</button>

  <script src="popup.js"></script>
</body>
</html>
